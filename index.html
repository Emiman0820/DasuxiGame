<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dasuxi Online</title>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main class="container">

        <!-- 部屋作成・参加画面 -->
        <section id="homeScreen">
            <h1>Dasuxi ONLINE</h1>

            <p id="connectionStatus">
                Firebaseに接続中...
            </p>

            <section class="player-section">
                <label for="playerName">
                    プレイヤー名
                </label>

                <input id="playerName" type="text" maxlength="12" placeholder="名前を入力">
            </section>

            <section class="create-room-section">
                <h2>部屋を作る</h2>

                <label for="maxPlayers">
                    対戦人数
                </label>

                <select id="maxPlayers">
                    <option value="2">2人</option>
                    <option value="3">3人</option>
                    <option value="4">4人</option>
                </select>

                <button id="createRoomButton">
                    部屋を作る
                </button>
            </section>

            <section class="join-room-section">
                <h2>部屋に入る</h2>

                <input id="roomIdInput" type="text" maxlength="6" placeholder="ルームID">

                <button id="joinRoomButton">
                    部屋に入る
                </button>
            </section>

            <p id="message"></p>
        </section>

        <!-- 待機ルーム画面 -->
        <section id="waitingRoomScreen" class="hidden">
            <h1>待機ルーム</h1>

            <p>ルームID</p>

            <p id="displayRoomId" class="room-id">
                ------
            </p>

            <p id="waitingMessage">
                プレイヤーを待っています
            </p>

            <div id="playerList"></div>

            <button id="startGameButton" class="hidden" disabled>
                ゲーム開始
            </button>
        </section>

        <!-- ゲーム画面 -->
        <section id="gameScreen" class="hidden">

            <header class="game-header">
                <div>
                    <h1>Dasuxi ONLINE</h1>
                    <p id="gameRoomId"></p>
                </div>

                <div id="gamePlayerList" class="game-player-summary"></div>
            </header>

            <div class="game-layout">

                <!-- 左側：ゲーム操作 -->
                <section class="game-main-column">

                    <div class="turn-information">
                        <p id="roundText">
                            ラウンド 1
                        </p>

                        <h2 id="currentPlayerText">
                            プレイヤーの手番
                        </h2>

                        <p id="turnMessage">
                            サイコロを振ってください
                        </p>
                    </div>

                    <section class="dice-panel">
                        <div id="diceArea" class="dice-area">
                            <button class="dice" data-index="0" type="button" aria-label="サイコロ1"></button>

                            <button class="dice" data-index="1" type="button" aria-label="サイコロ2"></button>

                            <button class="dice" data-index="2" type="button" aria-label="サイコロ3"></button>

                            <button class="dice" data-index="3" type="button" aria-label="サイコロ4"></button>

                            <button class="dice" data-index="4" type="button" aria-label="サイコロ5"></button>
                        </div>

                        <p id="remainingRollsText">
                            残り3回
                        </p>

                        <button id="rollDiceButton" disabled>
                            サイコロを振る
                        </button>
                    </section>

                    <!-- 操作用得点表 -->
                    <section class="score-section">
                        <div class="score-header">
                            <h2>役を選ぶ</h2>

                            <p id="scoreHelp">
                                サイコロを振ると得点候補が表示されます
                            </p>
                        </div>

                        <div id="scoreBoard" class="score-board"></div>
                    </section>

                </section>

                <!-- 右側：全体スコア -->
                <aside class="game-side-column">

                    <section class="all-score-section">
                        <div class="all-score-header">
                            <h2>スコアボード</h2>

                            <p>
                                各プレイヤーの確定済み得点
                            </p>
                        </div>

                        <div class="all-score-scroll">
                            <table id="allScoreBoard" class="all-score-board"></table>
                        </div>
                    </section>

                </aside>

            </div>
        </section>

        <!-- 結果画面 -->
        <section id="resultScreen" class="hidden">
            <header class="result-header">
                <p class="result-subtitle">
                    GAME RESULT
                </p>

                <h1>最終結果</h1>

                <p id="resultRoomId"></p>
            </header>

            <div id="winnerDisplay" class="winner-display">
                <p class="winner-label">
                    WINNER
                </p>

                <h2 id="winnerName">
                    Player 1
                </h2>

                <p id="winnerScore">
                    120点
                </p>
            </div>

            <div id="resultRanking" class="result-ranking"></div>

            <section class="result-score-section">
                <h2>最終スコア</h2>

                <div class="result-score-scroll">
                    <table id="resultScoreBoard" class="all-score-board"></table>
                </div>
            </section>

            <button id="returnHomeButton" type="button">
                タイトルへ戻る
            </button>
        </section>

    </main>

    <!-- 得点確定モーダル -->
    <div id="scoreConfirmModal" class="modal hidden">
        <div class="modal-content">
            <h2>得点を確定しますか？</h2>

            <p id="confirmCategoryName" class="confirm-category">
                フルハウス
            </p>

            <p id="confirmScoreValue" class="confirm-score">
                25点
            </p>

            <p class="confirm-warning">
                確定後は取り消せません
            </p>

            <div class="modal-buttons">
                <button id="cancelScoreButton" type="button">
                    キャンセル
                </button>

                <button id="confirmScoreButton" type="button">
                    確定する
                </button>
            </div>
        </div>
    </div>

    <!-- 得点演出 -->
    <div id="scoreEffect" class="score-effect hidden">
        <div class="score-effect-content">
            <p id="scoreEffectPlayer"></p>
            <h2 id="scoreEffectTitle">YACHT!!</h2>
            <p id="scoreEffectValue">50 POINTS</p>
        </div>
    </div>

    <audio id="diceRollSound" src="./sounds/dice-roll.mp3" preload="auto"></audio>
    <script type="module" src="./js/main.js?v=3"></script>
</body>

</html>
