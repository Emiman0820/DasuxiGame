<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Dasuxi Online</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <main class="container">

    <!-- 部屋作成・参加画面 -->
    <section id="homeScreen">
      <h1>Dasuxi ONLINE</h1>

      <p id="connectionStatus">
        Firebaseに接続中...
      </p>

      <section class="player-section">
        <label for="playerName">
          プレイヤー名
        </label>

        <input
          id="playerName"
          type="text"
          maxlength="12"
          placeholder="名前を入力"
        >
      </section>

      <section class="create-room-section">
        <h2>部屋を作る</h2>

        <label for="maxPlayers">
          対戦人数
        </label>

        <select id="maxPlayers">
          <option value="2">2人</option>
          <option value="3">3人</option>
          <option value="4">4人</option>
        </select>

        <button id="createRoomButton">
          部屋を作る
        </button>
      </section>

      <section class="join-room-section">
        <h2>部屋に入る</h2>

        <input
          id="roomIdInput"
          type="text"
          maxlength="6"
          placeholder="ルームID"
        >

        <button id="joinRoomButton">
          部屋に入る
        </button>
      </section>

      <p id="message"></p>
    </section>

    <!-- 待機ルーム画面 -->
    <section id="waitingRoomScreen" class="hidden">
        <h1>待機ルーム</h1>
    
        <p>ルームID</p>
    
        <p id="displayRoomId" class="room-id">
        ------
        </p>
    
        <p id="waitingMessage">
        プレイヤーを待っています
        </p>
    
        <div id="playerList"></div>
    
        <button
        id="startGameButton"
        class="hidden"
        disabled
        >
        ゲーム開始
        </button>
    </section>
    
    <!-- ゲーム画面 -->
<section id="gameScreen" class="hidden">
    <h1>Dasuxi ONLINE</h1>
  
    <p id="gameRoomId"></p>
  
    <div class="turn-information">
      <p id="roundText">
        ラウンド 1
      </p>
  
      <h2 id="currentPlayerText">
        プレイヤーの手番
      </h2>
  
      <p id="turnMessage">
        サイコロを振ってください
      </p>
    </div>
  
    <div id="diceArea" class="dice-area">
      <button class="dice" data-index="0">⚀</button>
      <button class="dice" data-index="1">⚀</button>
      <button class="dice" data-index="2">⚀</button>
      <button class="dice" data-index="3">⚀</button>
      <button class="dice" data-index="4">⚀</button>
    </div>
  
    <p id="remainingRollsText">
      残り3回
    </p>
  
    <button id="rollDiceButton" disabled>
      サイコロを振る
    </button>
  
    <div id="gamePlayerList"></div>
  </section>

  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
