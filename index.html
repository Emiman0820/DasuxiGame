<!DOCTYPE html>

  <title>Dasuxi Online</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <main class="container">
    <h1>Dasuxi ONLINE</h1>

    <p id="connectionStatus">
      Firebaseに接続中...
    </p>

    <section class="player-section">
      <label for="playerName">
        プレイヤー名
      </label>

      <input
        id="playerName"
        type="text"
        maxlength="12"
        placeholder="名前を入力"
      >
    </section>

    <section class="room-section">
      <button id="createRoomButton">
        部屋を作る
      </button>

      <input
        id="roomIdInput"
        type="text"
        maxlength="6"
        placeholder="ルームID"
      >

      <button id="joinRoomButton">
        部屋に入る
      </button>
    </section>

    <p id="message"></p>
  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
